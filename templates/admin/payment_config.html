<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración de Pago - Administración - ALABAZTRUM</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body class="bg-gray-50 admin-body">
    {% include 'partials/navbar-admin.html' %}

    <main class="min-h-screen py-8 bg-gray-50">
        <div class="container mx-auto px-6">
            <div class="max-w-3xl mx-auto">
                <!-- Header -->
                <div class="mb-8 flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900 mb-2">Configuración de Pago</h1>
                        <p class="text-sm text-gray-600">Actualiza los datos para las transferencias bancarias de tus
                            clientes.</p>
                    </div>
                </div>

                <!-- Mensaje -->
                <div id="message" class="hidden mb-6 p-4 rounded-lg text-sm font-medium"></div>

                <!-- Formulario -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden p-6">
                    <form id="paymentConfigForm" class="space-y-6">
                        <div>
                            <label for="bankInfo" class="block text-sm font-bold text-gray-700 mb-2">Datos Bancarios
                                para Transferencia</label>
                            <p class="text-xs text-gray-500 mb-3">Este texto se mostrará a los clientes al momento de
                                finalizar su pedido. Puedes incluir el nombre del banco, titular, cuenta y CLABE.</p>
                            <textarea id="bankInfo" name="bankInfo" rows="8"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent transition-all text-sm font-mono"
                                placeholder="Ej:
Banco: BBVA
Titular: ALABAZTRUM S.A. DE C.V.
Cuenta: 1234567890
CLABE: 012345678901234567
Concepto: (Tu número de pedido)"></textarea>
                        </div>

                        <div class="flex justify-end pt-4 border-t border-gray-100">
                            <button type="submit" id="saveBtn"
                                class="bg-gray-900 hover:bg-gray-800 text-white font-medium py-2.5 px-6 rounded-lg transition-all shadow-sm hover:shadow flex items-center gap-2">
                                <i class="fas fa-save"></i>
                                Guardar Configuración
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/navbar-admin.js') }}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Verificar auth y cargar datos
            auth.onAuthStateChanged((user) => {
                if (user) {
                    loadPaymentConfig();
                } else {
                    window.location.href = '/login';
                }
            });

            // Manejar submit
            document.getElementById('paymentConfigForm').addEventListener('submit', async function (e) {
                e.preventDefault();

                const btn = document.getElementById('saveBtn');
                const originalText = btn.innerHTML;
                const msg = document.getElementById('message');

                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';

                try {
                    const bankInfoText = document.getElementById('bankInfo').value;

                    await db.collection('config').doc('payment').set({
                        bankInfo: bankInfoText,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });

                    msg.className = 'mb-6 p-4 rounded-lg text-sm font-medium bg-green-50 text-green-700 border border-green-200';
                    msg.textContent = 'Configuración guardada exitosamente.';
                    msg.classList.remove('hidden');

                    setTimeout(() => { msg.classList.add('hidden'); }, 3000);
                } catch (error) {
                    console.error('Error guardando configuración:', error);
                    msg.className = 'mb-6 p-4 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200';
                    msg.textContent = 'Error al guardar: ' + error.message;
                    msg.classList.remove('hidden');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            });
        });

        async function loadPaymentConfig() {
            try {
                const doc = await db.collection('config').doc('payment').get();
                if (doc.exists) {
                    const data = doc.data();
                    if (data.bankInfo) {
                        document.getElementById('bankInfo').value = data.bankInfo;
                    }
                }
            } catch (error) {
                console.error("Error cargando configuración:", error);
            }
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Compras - ALABAZTRUM</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>

<body class="bg-gray-50">
    {% include 'partials/navbar.html' %}

    <main class="min-h-screen bg-gray-50 py-6 md:py-12">
        <div class="container mx-auto px-4">
            <div class="max-w-6xl mx-auto">
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h1 class="text-2xl font-semibold text-gray-800 mb-6">Mis Compras</h1>

                    <!-- Loading state -->
                    <div id="orders-loading" class="text-center py-12">
                        <div class="flex flex-col items-center">
                            <div class="bg-gray-100 rounded-full p-4 mb-3">
                                <i class="fas fa-spinner fa-spin text-gray-400 text-2xl"></i>
                            </div>
                            <p class="text-gray-600 font-medium">Cargando compras...</p>
                        </div>
                    </div>

                    <!-- Empty state -->
                    <div id="orders-empty" class="hidden text-center py-12">
                        <div class="flex flex-col items-center">
                            <i class="fas fa-shopping-bag text-gray-300 text-6xl mb-4"></i>
                            <h3 class="text-xl font-semibold text-gray-900 mb-2">No tienes compras aún</h3>
                            <p class="text-gray-600 mb-6">Cuando realices una compra, aparecerá aquí</p>
                            <a href="/fragancias"
                                class="inline-block bg-gray-900 hover:bg-gray-800 text-white font-semibold py-3 px-6 rounded-lg transition">
                                Ver Fragancias
                            </a>
                        </div>
                    </div>

                    <!-- Orders list -->
                    <div id="orders-list" class="hidden space-y-4">
                        <!-- Las órdenes se cargarán aquí dinámicamente -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts Firebase y autenticación -->
    <script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth-manager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/navbar-auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/navbar-persistent.js') }}"></script>

    <script>
        (function () {
            'use strict';

            let currentUser = null;

            // Cargar órdenes del usuario
            async function loadOrders() {
                // Esperar a que auth y db estén disponibles
                if (typeof auth === 'undefined' || typeof db === 'undefined' || !currentUser) {
                    console.log('Esperando disponibilidad de Auth/DB/User...');
                    setTimeout(loadOrders, 1000);
                    return;
                }

                try {
                    const loadingEl = document.getElementById('orders-loading');
                    const emptyEl = document.getElementById('orders-empty');
                    const listEl = document.getElementById('orders-list');

                    if (loadingEl) loadingEl.classList.remove('hidden');
                    if (emptyEl) emptyEl.classList.add('hidden');
                    if (listEl) listEl.classList.add('hidden');

                    // Buscar órdenes del usuario en Firestore
                    const ordersSnapshot = await db.collection('orders')
                        .where('userId', '==', currentUser.uid)
                        .get();

                    if (loadingEl) loadingEl.classList.add('hidden');

                    if (ordersSnapshot.empty) {
                        if (emptyEl) emptyEl.classList.remove('hidden');
                        return;
                    }

                    if (!listEl) return;
                    listEl.innerHTML = '';

                    let orders = [];
                    ordersSnapshot.forEach((doc) => {
                        const order = doc.id ? { id: doc.id, ...doc.data() } : doc.data();
                        const orderDate = (order.createdAt && order.createdAt.toDate) ? order.createdAt.toDate() : (order.createdAt ? new Date(order.createdAt) : new Date());
                        orders.push({
                            id: doc.id,
                            data: order,
                            date: orderDate
                        });
                    });

                    // Ordenar por fecha (más reciente primero)
                    orders.sort((a, b) => b.date - a.date);

                    // Mostrar las órdenes ordenadas
                    orders.forEach((orderItem) => {
                        const order = orderItem.data;
                        const orderDate = orderItem.date;
                        const formattedDate = orderDate.toLocaleDateString('es-MX', {
                            day: '2-digit',
                            month: '2-digit',
                            year: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        });

                        // Cálculo robusto del total
                        let total = 0;
                        if (typeof order.total === 'number') {
                            total = order.total;
                        } else if (order.items && Array.isArray(order.items)) {
                            total = order.items.reduce((sum, item) => {
                                const price = parseFloat(item.price) || 0;
                                const qty = parseInt(item.quantity) || 0;
                                return sum + (price * qty);
                            }, 0);
                            // Añadir envío si existe
                            total += (parseFloat(order.shipping) || 0);
                        }

                        const status = (order.status || 'pending').toLowerCase();

                        // Mapear estados (soporta ambos idiomas para evitar errores)
                        const statusMap = {
                            'pending': 'Pendiente',
                            'pendiente': 'Pendiente',
                            'processing': 'En Proceso',
                            'procesando': 'En Proceso',
                            'shipped': 'En Camino',
                            'enviado': 'En Camino',
                            'entrega': 'En Entrega',
                            'delivered': 'Entregado',
                            'entregado': 'Entregado',
                            'cancelled': 'Cancelado',
                            'cancelado': 'Cancelado'
                        };

                        const statusText = statusMap[status] || status;
                        const statusColors = {
                            'pending': 'bg-yellow-100 text-yellow-800',
                            'pendiente': 'bg-yellow-100 text-yellow-800',
                            'processing': 'bg-blue-100 text-blue-800',
                            'procesando': 'bg-blue-100 text-blue-800',
                            'shipped': 'bg-indigo-100 text-indigo-800',
                            'enviado': 'bg-indigo-100 text-indigo-800',
                            'entrega': 'bg-purple-100 text-purple-800',
                            'delivered': 'bg-green-100 text-green-800',
                            'entregado': 'bg-green-100 text-green-800',
                            'cancelled': 'bg-red-100 text-red-800',
                            'cancelado': 'bg-red-100 text-red-800'
                        };

                        const orderCard = document.createElement('div');
                        orderCard.className = 'border border-gray-200 rounded-lg p-6 hover:shadow-md transition';
                        orderCard.innerHTML = `
                            <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-4">
                                <div>
                                    <h3 class="text-lg font-semibold text-gray-900 mb-1">Pedido #${orderItem.id.substring(0, 8).toUpperCase()}</h3>
                                    <p class="text-sm text-gray-600">${formattedDate}</p>
                                </div>
                                <div class="mt-2 md:mt-0">
                                    <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium ${statusColors[status] || 'bg-gray-100 text-gray-800'}">
                                        ${statusText}
                                    </span>
                                </div>
                            </div>
                            <div class="border-t border-gray-200 pt-4">
                                <div class="flex justify-between items-center mb-3">
                                    <span class="text-sm text-gray-600">${order.items?.length || 0} producto(s)</span>
                                    <span class="text-lg font-bold text-gray-900">$${total.toFixed(2)}</span>
                                </div>
                                <div class="space-y-3">
                                    ${(order.items || []).slice(0, 3).map(item => {
                            const imageUrl = item.images && item.images.length > 0
                                ? item.images[0]
                                : (item.image || 'https://via.placeholder.com/50?text=Sin+Imagen');

                            const price = parseFloat(item.price) || 0;
                            const qty = parseInt(item.quantity) || 1;

                            return `
                                        <div class="flex items-center gap-3 text-sm">
                                            <img src="${imageUrl}" 
                                                 alt="${item.name || 'Producto'}" 
                                                 class="w-12 h-12 object-cover rounded"
                                                 onerror="this.src='https://via.placeholder.com/50?text=Sin+Imagen'">
                                            <div class="flex-grow">
                                                <p class="font-medium text-gray-900">${item.name || 'Producto'}</p>
                                                <p class="text-gray-600 text-xs">Cant: ${qty} • $${price.toFixed(2)} c/u</p>
                                            </div>
                                            <p class="font-semibold text-gray-900">$${(price * qty).toFixed(2)}</p>
                                        </div>
                                        `;
                        }).join('')}
                                    ${(order.items || []).length > 3 ? `<p class="text-xs text-blue-600 font-medium mt-2">+${(order.items || []).length - 3} producto(s) adicionales</p>` : ''}
                                </div>
                                <div class="mt-5 pt-4 border-t border-gray-200">
                                    <a href="/orden-detalle?orderId=${orderItem.id}" class="text-sm text-gray-900 hover:text-black font-semibold inline-flex items-center transition">
                                        Ver detalles y seguimiento
                                        <i class="fas fa-chevron-right ml-2 text-xs"></i>
                                    </a>
                                </div>
                            </div>
                        `;
                        listEl.appendChild(orderCard);
                    });

                    listEl.classList.remove('hidden');
                } catch (error) {
                    console.error('Error al cargar órdenes:', error);
                    const loadingEl = document.getElementById('orders-loading');
                    const emptyEl = document.getElementById('orders-empty');
                    if (loadingEl) loadingEl.classList.add('hidden');
                    if (emptyEl) {
                        emptyEl.classList.remove('hidden');
                        emptyEl.innerHTML = `
                            <div class="flex flex-col items-center">
                                <i class="fas fa-exclamation-triangle text-red-300 text-5xl mb-4"></i>
                                <h3 class="text-lg font-semibold text-gray-900 mb-2">Hubo un problema al cargar tus compras</h3>
                                <p class="text-gray-600 mb-4">${error.message}</p>
                                <button onclick="location.reload()" class="bg-gray-900 text-white px-6 py-2 rounded-lg text-sm font-medium">Reintentar</button>
                            </div>
                        `;
                    }
                }
            }

            // Verificar autenticación y cargar órdenes
            function initAuth() {
                if (typeof auth === 'undefined') {
                    setTimeout(initAuth, 500);
                    return;
                }

                auth.onAuthStateChanged(async (user) => {
                    if (!user) {
                        window.location.href = '/login';
                        return;
                    }

                    currentUser = user;
                    await loadOrders();
                });
            }

            initAuth();
        })();
    </script>
    {% include 'partials/footer.html' %}
</body>

</html>
